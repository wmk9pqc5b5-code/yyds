# ============================================================
#  yyds.dylib — GitHub Actions 自动编译 (Ubuntu 交叉编译版)
#
#  解决 macOS runner 排队问题 — 改用 ubuntu-latest + cctools 交叉编译
# ============================================================

name: yyds Build

on:
  push:
    branches: [main, master]
    paths:
      - 'Tweak.xm'
      - 'control'
      - 'yyds.plist'
      - 'YYDSRootListController.*'
      - 'Resources/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: 编译 yyds (arm64, ubuntu 交叉编译)
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # Step 1: 检出代码
      # ==========================================
      - name: 检出代码
        uses: actions/checkout@v4

      # ==========================================
      # Step 2: 安装依赖
      # ==========================================
      - name: 安装编译工具
        run: |
          sudo apt update
          sudo apt install -y clang ldid make git perl

          # ldid 版本检查
          ldid 2>&1 || echo "ldid OK"

      # ==========================================
      # Step 3: 安装 Theos (带 SDK)
      # ==========================================
      - name: 安装 Theos
        run: |
          export THEOS=/opt/theos
          sudo mkdir -p $THEOS
          sudo chown -R $(whoami) $THEOS

          git clone --depth 1 https://github.com/theos/theos.git $THEOS 2>&1 | tail -5

          # 下载 iPhoneOS SDK (从 theos sdks 仓库)
          echo "下载 iPhoneOS 15.0 SDK..."
          SDK_REPO="https://github.com/theos/sdks"
          SDK_DIR=$THEOS/sdks
          mkdir -p $SDK_DIR

          # 尝试从 theos sdks 获取预编译 SDK
          git clone --depth 1 --filter=blob:none --sparse $SDK_REPO /tmp/theos-sdks 2>/dev/null
          cd /tmp/theos-sdks
          git sparse-checkout set iPhoneOS15.0.sdk 2>/dev/null || true

          if [ -d "iPhoneOS15.0.sdk" ]; then
            cp -r iPhoneOS15.0.sdk $SDK_DIR/
            echo "SDK 安装完成"
          else
            # 备用方案：使用 iPhoneOS16.0
            cd $THEOS/sdks
            git clone --depth 1 --filter=blob:none --sparse $SDK_REPO . 2>/dev/null || true
            git sparse-checkout set iPhoneOS16.0.sdk 2>/dev/null || true
            if [ ! -d "iPhoneOS16.0.sdk" ] && [ ! -d "iPhoneOS15.0.sdk" ]; then
              # 应急方案：从另一源获取
              wget -q "https://github.com/theos/sdks/releases/download/master/iPhoneOS16.0.sdk.tar.xz" -O /tmp/sdk.tar.xz 2>/dev/null || true
              tar -xf /tmp/sdk.tar.xz -C $SDK_DIR/ 2>/dev/null || true
            fi
          fi

          echo "已安装 SDK:"
          ls -la $SDK_DIR/

          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      # ==========================================
      # Step 4: 编译项目
      # ==========================================
      - name: 编译 yyds (Theos)
        run: |
          export THEOS=/opt/theos
          
          # 验证环境
          echo "THEOS: $THEOS"
          echo "SDKs available:"
          ls -la $THEOS/sdks/ 2>/dev/null || echo "(no sdks dir)"
          echo "---"

          # 尝试编译
          make clean 2>&1 || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 || {
            echo "::warning::Theos 编译失败, 尝试手动编译 dylib..."
            exit 1
          }

          echo "编译产物:"
          ls -la packages/ 2>/dev/null || echo "无 packages"
          find . -name "*.dylib" -o -name "*.deb" 2>/dev/null

      # ==========================================
      # Step 5: 备用方案 — 手动交叉编译 dylib
      # ==========================================
      - name: 手动编译 dylib (备用)
        if: failure()
        run: |
          echo "========== 备用编译方案 — 纯 clang 交叉编译 =========="

          # 安装 cctools
          sudo apt install -y clang llvm

          # 尝试用 llvm 的 arm64 目标编译
          # Tweak.xm 是 Logos 语法, 需要预处理去掉 %ctor %hook 等
          
          # 方法: 编译为普通 objc dylib
          # 注意: MSHookFunction 的调用需要 substrate 库, 在 Ubuntu 上我们用 dlsym 替代
          
          cat > /tmp/yyds_stub.c << 'STUB'
          // Stub for substrate functions — 运行时由 Cydia Substrate 提供
          void MSHookFunction(void *symbol, void *replace, void **result) {}
          void MSHookMessageEx(Class cls, SEL sel, IMP imp, IMP *result) {}
          STUB

          # 将 Tweak.xm 编译为 arm64 dylib
          arm64-apple-darwin-clang 2>/dev/null && {
            arm64-apple-darwin-clang -dynamiclib -arch arm64 \
              -o yyds.dylib Tweak.xm /tmp/yyds_stub.c \
              -framework Foundation -framework UIKit -framework IOKit \
              -isysroot /opt/theos/sdks/iPhoneOS16.0.sdk \
              -miphoneos-version-min=14.0 \
              -fobjc-arc -lobjc
          } || {
            echo "无 arm64-apple-darwin-clang, 使用 clang + target triple"
            clang -target arm64-apple-ios14.0 -dynamiclib \
              -o yyds.dylib Tweak.xm /tmp/yyds_stub.c \
              -framework Foundation -framework UIKit -framework IOKit \
              -isysroot /opt/theos/sdks/iPhoneOS16.0.sdk 2>/dev/null \
              -fobjc-arc -lobjc -Wno-everything || {
                echo "::error::手动编译也失败了"
                exit 1
              }
          }

          echo "手动编译完成:"
          ls -la yyds.dylib

      # ==========================================
      # Step 6: 打包 .deb
      # ==========================================
      - name: 打包 deb
        if: always()
        run: |
          # 查找 dylib
          DYLIB=$(find . -name "yyds.dylib" -not -path "./.theos/*" 2>/dev/null | head -1)
          if [ -z "$DYLIB" ]; then
            DYLIB=$(find .theos -name "yyds.dylib" 2>/dev/null | head -1)
          fi

          if [ -n "$DYLIB" ]; then
            echo "找到 dylib: $DYLIB"
            
            # 手动构建 deb 包
            DEB_DIR=/tmp/yyds_deb
            mkdir -p $DEB_DIR/DEBIAN
            mkdir -p $DEB_DIR/Library/MobileSubstrate/DynamicLibraries
            
            # 复制 dylib
            cp "$DYLIB" $DEB_DIR/Library/MobileSubstrate/DynamicLibraries/yyds.dylib
            
            # 复制 plist
            cp yyds.plist $DEB_DIR/Library/MobileSubstrate/DynamicLibraries/ 2>/dev/null || true
            
            # 复制 PreferenceBundle (如果有的话)
            BUNDLE_SRC=$(find .theos -name "yydsprefs.bundle" -type d 2>/dev/null | head -1)
            if [ -n "$BUNDLE_SRC" ]; then
              mkdir -p $DEB_DIR/Library/PreferenceBundles
              cp -r "$BUNDLE_SRC" $DEB_DIR/Library/PreferenceBundles/
            fi

            # 创建 control 文件
            cat > $DEB_DIR/DEBIAN/control << 'CONTROL'
Package: com.yyds.bypass
Name: yyds 游戏检测屏蔽器
Version: 1.0.0
Architecture: iphoneos-arm
Description: 腾讯 TSS 游戏安全模块本地检测全屏蔽
Maintainer: yyds
Author: yyds
Section: Tweaks
Depends: mobilesubstrate, firmware (>= 14.0)
CONTROL

            # 设置权限
            chmod 755 $DEB_DIR/DEBIAN
            chmod 644 $DEB_DIR/DEBIAN/control
            chmod 755 $DEB_DIR/Library/MobileSubstrate/DynamicLibraries/yyds.dylib

            # 打包
            dpkg-deb --build $DEB_DIR yyds_1.0.0_iphoneos-arm.deb
            echo "deb 打包完成:"
            ls -la yyds_1.0.0_iphoneos-arm.deb
            
            cp yyds_1.0.0_iphoneos-arm.deb packages/ 2>/dev/null || mkdir -p packages && cp yyds_1.0.0_iphoneos-arm.deb packages/
          else
            echo "未找到 dylib 文件, 仅列出所有文件:"
            find . -type f 2>/dev/null | head -50
          fi

      # ==========================================
      # Step 7: 上传产物
      # ==========================================
      - name: 上传 deb
        uses: actions/upload-artifact@v4
        with:
          name: yyds-deb
          path: |
            packages/*.deb
            yyds_*.deb
          retention-days: 90

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: yyds-dylib
          path: |
            *.dylib
            .theos/**/yyds.dylib
          retention-days: 90
